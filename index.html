<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incognito Mode Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        
        .status {
            font-size: 24px;
            margin: 20px 0;
            padding: 20px;
            border-radius: 10px;
        }
        
        .private {
            background-color: #fee;
            color: #c00;
            border: 2px solid #c00;
        }
        
        .normal {
            background-color: #efe;
            color: #080;
            border: 2px solid #080;
        }
        
        .loading {
            background-color: #eef;
            color: #66a;
        }
        
        button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: scale(1.05);
            background-color: #5a67d8;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .info {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }
        
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🕵️</div>
        <h1>Browser Detection</h1>
        <div id="status" class="status loading">
            🔍 Checking browser mode...
        </div>
        <button onclick="checkAgain()">Check Again</button>
        <div class="info">
            This test detects private/incognito browsing modes
        </div>
    </div>

    <!-- Your requested library -->
    <script src="https://cdn.jsdelivr.net/gh/Joe12387/detectIncognito@main/dist/es5/detectIncognito.min.js"></script>
    
    <script>
        const statusDiv = document.getElementById('status');
        
        async function checkIncognito() {
            statusDiv.className = 'status loading';
            statusDiv.innerHTML = '🔍 Checking browser mode...';
            
            try {
                // Using the detectIncognito library
                const result = await detectIncognito();
                
                if (result.isPrivate) {
                    statusDiv.className = 'status private';
                    statusDiv.innerHTML = '🔒 PRIVATE/INCOGNITO MODE DETECTED 🔒<br><small>You are browsing in private mode</small>';
                } else {
                    statusDiv.className = 'status normal';
                    statusDiv.innerHTML = '✅ NORMAL MODE ✅<br><small>Private browsing is NOT active</small>';
                }
                
                console.log('Detection result:', result);
                
            } catch (error) {
                console.error('Detection failed:', error);
                statusDiv.className = 'status private';
                statusDiv.innerHTML = '⚠️ DETECTION ERROR ⚠️<br><small>Could not determine browser mode</small>';
            }
        }
        
        // Wait for library to load then run
        window.addEventListener('load', function() {
            if (typeof detectIncognito !== 'undefined') {
                checkIncognito();
            } else {
                statusDiv.innerHTML = '⚠️ Library failed to load ⚠️';
            }
        });
        
        // Make function global for button click
        window.checkAgain = checkIncognito;
    </script>
</body>
</html>
