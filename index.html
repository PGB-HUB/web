<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🔒 Gatekeeper | Anti-VPN & Anti-Incognito Shield</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: #fff;
        }
        .shield-container {
            max-width: 720px;
            width: 100%;
            background: rgba(12, 20, 30, 0.75);
            backdrop-filter: blur(18px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
        }
        .inner-panel { padding: 2.5rem; }
        .badge {
            display: inline-flex;
            background: rgba(0, 212, 255, 0.12);
            border-radius: 100px;
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
            color: #7ee0ff;
            margin-bottom: 1.5rem;
            border: 0.5px solid rgba(0, 255, 255, 0.4);
        }
        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #F0F9FF 0%, #a0e7ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .sub {
            color: #8e9aaf;
            margin-bottom: 2rem;
            border-left: 3px solid #2ad4b6;
            padding-left: 1rem;
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
        }
        .status-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 1.2rem;
            padding: 1.2rem;
            border: 1px solid rgba(70, 130, 200, 0.2);
        }
        .status-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6c86a3;
            margin-bottom: 0.5rem;
        }
        .status-value { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .verdict-safe { color: #2ee6a8; }
        .verdict-danger { color: #ff5e7c; }
        .access-block {
            background: rgba(255, 40, 80, 0.1);
            border: 1px solid rgba(255, 70, 100, 0.4);
            border-radius: 1.2rem;
            padding: 1.5rem;
        }
        .access-grant {
            background: rgba(40, 210, 140, 0.1);
            border: 1px solid rgba(46, 230, 168, 0.4);
            border-radius: 1.2rem;
            padding: 1.5rem;
        }
        .hidden { display: none; }
        button {
            width: 100%;
            background: #2ad4b6;
            color: #0a0f1e;
            border: none;
            padding: 1rem;
            border-radius: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .loader {
            width: 16px; height: 16px;
            border: 2px solid #2ad4b6;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="shield-container">
    <div class="inner-panel">
        <div class="badge">🛡️ ACTIVE SECURITY SCANNER</div>
        <h1>Environment Guard</h1>
        <div class="sub">Validating network integrity and browser privacy status...</div>

        <div class="status-grid">
            <div class="status-card">
                <div class="status-label">Network Status</div>
                <div id="vpnStatus" class="status-value"><span class="loader"></span> Scanning...</div>
            </div>
            <div class="status-card">
                <div class="status-label">Browser Privacy</div>
                <div id="incognitoStatus" class="status-value"><span class="loader"></span> Analyzing...</div>
            </div>
        </div>

        <div id="ui-blocked" class="access-block hidden">
            <div style="font-weight: bold; margin-bottom: 8px;">⛔ ACCESS RESTRICTED</div>
            <div id="denyReason" style="font-size: 0.9rem; color: #ccced1;"></div>
            <button onclick="location.reload()">RE-SCAN ENVIRONMENT</button>
        </div>

        <div id="ui-granted" class="access-grant hidden">
            <div style="font-weight: bold; margin-bottom: 8px;">✅ SECURE ACCESS GRANTED</div>
            <div style="font-size: 0.9rem; color: #ccced1;">Your environment meets our security standards.</div>
        </div>
    </div>
</div>

<script>
    async function detectIncognito() {
        // Method 1: Chromium Quota Heuristic (Highly reliable)
        if ('storage' in navigator && 'estimate' in navigator.storage) {
            const { quota } = await navigator.storage.estimate();
            // Incognito mode in Chrome/Edge/Brave is capped at a low fixed value (usually < 400MB)
            if (quota < 400 * 1024 * 1024) return true;
        }

        // Method 2: Firefox IndexedDB (Firefox blocks IDB in private mode)
        if (navigator.userAgent.includes("Firefox")) {
            try {
                const db = indexedDB.open("test");
                return await new Promise(resolve => {
                    db.onerror = () => resolve(true);
                    db.onsuccess = () => resolve(false);
                });
            } catch (e) { return true; }
        }

        // Method 3: Safari Private Mode logic
        if (/Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent)) {
            try {
                window.safari.pushNotification.toString();
            } catch (e) {
                return e.name === 'TypeError' ? false : true;
            }
        }
        
        return false;
    }

    async function detectVpn() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            // Checks for proxy flag or hosting/datacenter organization names
            const vpnKeywords = ['vpn', 'proxy', 'hosting', 'datacenter', 'm247', 'ovh', 'digitalocean', 'vultr', 'aws'];
            const isVpnOrg = vpnKeywords.some(kw => (data.org || '').toLowerCase().includes(kw));
            
            return {
                isVpn: data.proxy || data.hosting || isVpnOrg,
                ip: data.ip
            };
        } catch (e) {
            console.error("Network check failed", e);
            return { isVpn: false, error: true };
        }
    }

    async function runSecurityCheck() {
        const vpnResult = await detectVpn();
        const incognitoActive = await detectIncognito();

        const vpnEl = document.getElementById('vpnStatus');
        const incogEl = document.getElementById('incognitoStatus');
        const blockedEl = document.getElementById('ui-blocked');
        const grantedEl = document.getElementById('ui-granted');
        const reasonEl = document.getElementById('denyReason');

        // Update UI status cards
        if (vpnResult.isVpn) {
            vpnEl.innerHTML = '<span class="verdict-danger">⚠️ VPN/Proxy Detected</span>';
        } else {
            vpnEl.innerHTML = '<span class="verdict-safe">✓ Clean Network</span>';
        }

        if (incognitoActive) {
            incogEl.innerHTML = '<span class="verdict-danger">⚠️ Private Mode Active</span>';
        } else {
            incogEl.innerHTML = '<span class="verdict-safe">✓ Standard Mode</span>';
        }

        // Final Verdict
        if (vpnResult.isVpn || incognitoActive) {
            blockedEl.classList.remove('hidden');
            let reasons = [];
            if (vpnResult.isVpn) reasons.push("Virtual Private Network (VPN)");
            if (incognitoActive) reasons.push("Incognito/Private Browsing");
            reasonEl.innerText = "Please disable " + reasons.join(" and ") + " to continue.";
        } else {
            grantedEl.classList.remove('hidden');
        }
    }

    window.onload = runSecurityCheck;
</script>

</body>
</html>
