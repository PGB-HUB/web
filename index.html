<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Gatekeeper | Security Shield</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #0a0f1e;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .shield-container {
            max-width: 600px;
            width: 90%;
            background: rgba(16, 24, 40, 0.95);
            padding: 2.5rem;
            border-radius: 2rem;
            border: 1px solid #2ad4b6;
            box-shadow: 0 0 30px rgba(42, 212, 182, 0.2);
            text-align: center;
        }
        .status-box {
            display: flex;
            justify-content: space-around;
            margin: 2rem 0;
            gap: 1rem;
        }
        .card {
            background: #000;
            padding: 1rem;
            border-radius: 1rem;
            flex: 1;
            border: 1px solid #333;
        }
        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-weight: bold; font-size: 0.9rem; }
        .danger { color: #ff5e7c; }
        .safe { color: #2ee6a8; }
        .hidden { display: none; }
        .btn {
            background: #2ad4b6;
            color: #0a0f1e;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
            cursor: pointer;
        }
        .loader {
            border: 2px solid #333;
            border-top: 2px solid #2ad4b6;
            border-radius: 50%;
            width: 15px;
            height: 15px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="shield-container">
    <h2 style="margin-bottom: 10px;">Security Verification</h2>
    <p style="color: #8e9aaf; font-size: 0.9rem;">Analyzing environment for VPN and Private Mode...</p>

    <div class="status-box">
        <div class="card">
            <div class="label">Network</div>
            <div id="vpnStat" class="value"><div class="loader"></div></div>
        </div>
        <div class="card">
            <div class="label">Privacy</div>
            <div id="incogStat" class="value"><div class="loader"></div></div>
        </div>
    </div>

    <div id="blockedMsg" class="hidden">
        <h3 class="danger">Access Denied</h3>
        <p id="reason" style="font-size: 0.85rem; margin: 10px 0;"></p>
        <div class="btn" onclick="location.reload()">Re-Scan</div>
    </div>

    <div id="grantedMsg" class="hidden">
        <h3 class="safe">Access Granted</h3>
        <p style="font-size: 0.85rem; margin-top: 5px;">Secure session established.</p>
    </div>
</div>

<script>
    async function checkIncognito() {
        // Trap 1: Service Worker Check (Service workers are often disabled/restricted in Private mode)
        if ('serviceWorker' in navigator) {
            // This is a common point of failure for Incognito
        }

        // Trap 2: Storage Quota Heuristic (The most reliable for Chromium 2024-2026)
        if ('storage' in navigator && 'estimate' in navigator.storage) {
            const { quota } = await navigator.storage.estimate();
            // In normal mode, quota is huge (GBs). In Incognito, it's capped (usually < 400MB)
            if (quota < 450 * 1024 * 1024) return true;
        }

        // Trap 3: Firefox IndexedDB (Reliable for Firefox)
        if (navigator.userAgent.includes("Firefox")) {
            try {
                const db = indexedDB.open("test");
                return await new Promise(res => {
                    db.onerror = () => res(true);
                    db.onsuccess = () => res(false);
                });
            } catch (e) { return true; }
        }

        // Trap 4: Permissions API (Newer Chrome logic)
        try {
            if (navigator.permissions) {
                const result = await navigator.permissions.query({ name: 'notifications' });
                if (result.state === 'prompt' && !('onchange' in result)) return true;
            }
        } catch(e) {}

        return false;
    }

    async function checkVPN() {
        try {
            // Using a high-speed IP check
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            const vpnKeywords = ['vpn', 'proxy', 'hosting', 'datacenter', 'm247', 'ovh', 'cloudflare', 'akamai'];
            const isp = (data.org || "").toLowerCase();
            const isBadNetwork = data.proxy || data.hosting || vpnKeywords.some(k => isp.includes(k));
            
            return { isVpn: isBadNetwork, ip: data.ip };
        } catch (e) {
            return { isVpn: false, error: true };
        }
    }

    async function runShield() {
        const [isIncog, vpnResult] = await Promise.all([checkIncognito(), checkVPN()]);

        const vpnEl = document.getElementById('vpnStat');
        const incogEl = document.getElementById('incogStat');
        const blocked = document.getElementById('blockedMsg');
        const granted = document.getElementById('grantedMsg');
        const reason = document.getElementById('reason');

        // Update UI
        vpnEl.innerHTML = vpnResult.isVpn ? '<span class="danger">VPN</span>' : '<span class="safe">Clean</span>';
        incogEl.innerHTML = isIncog ? '<span class="danger">Private</span>' : '<span class="safe">Standard</span>';

        if (isIncog || vpnResult.isVpn) {
            blocked.classList.remove('hidden');
            let txt = [];
            if (isIncog) txt.push("Incognito Mode");
            if (vpnResult.isVpn) txt.push("VPN/Proxy");
            reason.innerText = "Please disable " + txt.join(" and ") + " to access this site.";
        } else {
            granted.classList.remove('hidden');
        }
    }

    window.onload = runShield;
</script>

</body>
</html>
